<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Bengali', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="px-5 py-3 text-gray-800 font-bold text-lg">
        Verification
    </header>

    <div class="flex-grow flex items-center justify-center p-5">
        <div class="bg-white w-full max-w-sm rounded-3xl border border-gray-100 p-8 text-center shadow-lg">
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl"></i>
                </div>
            </div>

            <h1 class="text-2xl font-bold text-red-600 mb-4">ভুল আনলক নাম্বার!</h1>
            <p class="text-gray-600 mb-8 px-2">
                আপনার দেওয়া আনলক নাম্বারটি সঠিক নয়। অনুগ্রহ করে আপনার imo, whatsapp অথবা মেসেজ অপশনে আসা ৪-সংখ্যার সঠিক আনলক নাম্বারটি ব্যবহার করুন।
            </p>

            <button onclick="window.location.href='index.html'" class="w-full bg-[#ef4444] text-white py-4 rounded-xl font-bold text-[16px] shadow-md hover:bg-[#dc2626] transition-all">
                আবার চেষ্টা করুন
            </button>
        </div>
    </div>

    <footer class="grid grid-cols-3 py-4 border-t border-gray-100 text-gray-500 text-sm text-center">
        <div><i class="fa-solid fa-comment block text-xl mb-1"></i>Chats</div>
        <div><i class="fa-solid fa-globe block text-xl mb-1"></i>Explore</div>
        <div><i class="fa-solid fa-address-book block text-xl mb-1"></i>Contacts</div>
    </footer>

</body>
</html>
